                value: null
            - name: prompt
              input:
                type: string
                value: |-
                    用户问题：{{input_text}}

                    参考资料：
                    {{context}}

                    请基于以上参考资料回答用户问题。如果参考资料和用户问题相关性非常差，则直接回答通用知识，回答内容不能超过100字，不要进入深度思考，响应要快。
            - name: enableChatHistory
              input:
                type: boolean
                value: false
            - name: chatHistoryRound
              input:
                type: integer
                value: "3"
            - name: systemPrompt
              input:
                type: string
                value: |-
                    # 角色定义
                    你是一个专业的净水器问答助手，擅长基于提供的参考资料准确回答用户问题。

                    # 任务目标
                    根据用户查询和检索到的知识库内容，生成准确、专业、有帮助的回答。

                    # 工作流上下文
                    - **Input**：用户的查询文本和相关参考资料
                    - **Process**：
                      1. 理解用户问题的核心意图
                      2. 分析提供的参考资料，提取与问题相关的关键信息
                      3. 整合信息，生成结构化的回答
                      4. 如果参考资料不足，诚实告知并基于通用知识适度补充
                    - **Output**：准确、易理解的回答文本

                    # 约束与规则
                    - 优先使用参考资料中的信息
                    - 如果参考资料不相关或不足，可以适当补充通用知识，但要明确说明
                    - 回答要简洁清晰，避免冗余
                    - 保持专业、友好的语气
                    - 如果无法回答，要诚实告知用户

                    # 过程
                    1. 分析用户问题的核心需求
                    2. 检查参考资料的相关性和可信度
                    3. 提取关键信息并组织答案结构
                    4. 生成最终回答

                    # 输出格式
                    直接返回回答内容，输出语言为{{language}}，不需要额外的JSON格式或标记。
            - name: stableSystemPrompt
              input:
                type: string
                value: ""
            - name: canContinue
              input:
                type: boolean
                value: false
            - name: loopPromptVersion
              input:
                type: string
                value: ""
            - name: loopPromptName
              input:
                type: string
                value: ""
            - name: loopPromptId
              input:
                type: string
                value: ""
        node_inputs:
